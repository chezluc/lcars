name: Sync SKILL.md

on:
  push:
    branches: [main]
    paths:
      - skills/lcars/SKILL.md

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Copy to duplicate locations
        run: |
          cp skills/lcars/SKILL.md lcars/SKILL.md
          cp skills/lcars/SKILL.md plugins/lcars/skills/lcars/SKILL.md
          cp skills/lcars/SKILL.md .cursor/skills/lcars/SKILL.md

      - name: Rebuild lcars.skill ZIP
        run: |
          cd skills && zip -r ../lcars.skill lcars/

      - name: Commit and push if changed
        run: |
          git diff --quiet && exit 0
          git add lcars/SKILL.md plugins/lcars/skills/lcars/SKILL.md .cursor/skills/lcars/SKILL.md lcars.skill
          git commit -m "chore: sync SKILL.md copies and lcars.skill [skip ci]"
          git push
